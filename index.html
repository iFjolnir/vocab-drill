<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vocab Drill</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%20-960%20960%20960%22%3E%3Cstyle%3Epath%7Bfill%3A%23000%7D%40media%20%28prefers-color-scheme%3Adark%29%7Bpath%7Bfill%3A%23fff%7D%7D%3C/style%3E%3Cpath%20d%3D%22M130-189%2081-546q-5-32%2015.5-58t52.5-31l61%20435%20283-40h267q-8%2021-24.5%2035.5T695-187l-477%2066q-33%205-58-15t-30-53Zm190-127q-33%200-56.5-23.5T240-396v-364q0-33%2023.5-56.5T320-840h480q33%200%2056.5%2023.5T880-760v364q0%2033-23.5%2056.5T800-316H320Zm0-80h480v-364H320v364Zm0%200v-364%20364ZM210-200Zm190-400h320v-80H400v80Zm0%20120h200v-80H400v80Z%22/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C1B1F;
    --ink-soft:#2E2C32;
    --paper:#F7F4EE;
    --paper-dim:#EDE9E0;
    --red:#C1442E;
    --red-soft:#E8C4BB;
    --jade:#5B8C7B;
    --jade-soft:#CBE0D6;
    --gold:#C79A3E;

    /* theme-mapped tokens (dark default) */
    --bg:#1C1B1F;
    --fg:#F7F4EE;
    --fg-dim:rgba(247,244,238,0.55);
    --fg-dimmer:rgba(247,244,238,0.4);
    --fg-faint:rgba(247,244,238,0.14);
    --panel:rgba(247,244,238,0.06);
    --panel-border:rgba(247,244,238,0.14);
    --card-front-bg:#D9D4C6;
    --card-front-fg:#2A2820;
    --card-back-bg:#38363E;
    --card-back-fg:#EDE9E0;
  }
  html[data-theme="light"]{
    --bg:#F7F4EE;
    --fg:#1C1B1F;
    --fg-dim:rgba(28,27,31,0.6);
    --fg-dimmer:rgba(28,27,31,0.45);
    --fg-faint:rgba(28,27,31,0.14);
    --panel:rgba(28,27,31,0.045);
    --panel-border:rgba(28,27,31,0.12);
    --card-front-bg:#4A484E;
    --card-front-fg:#EDE9E0;
    --card-back-bg:#FAF8F4;
    --card-back-fg:#2A2820;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease, color .2s ease;
  }
  .kr{font-family:'Noto Serif KR', serif;}
  #app{max-width:640px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:18px 20px 10px; gap:10px;}
  .brand{display:flex; flex-direction:column; gap:2px;}
  .brand .mark{font-family:'Noto Serif KR'; font-weight:900; font-size:20px; letter-spacing:0.02em; color:var(--fg); cursor:text;}
  .deck-name-input{
    font-family:'Noto Serif KR'; font-weight:900; font-size:20px; letter-spacing:0.02em; color:var(--fg);
    background:transparent; border:none; border-bottom:1.5px dashed var(--fg-dim); outline:none; padding:0 0 1px; width:180px;
  }
  .brand .sub{font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-dimmer); font-weight:600;}
  .topbar-actions{display:flex; gap:8px; align-items:center;}
  .ico{width:1em; height:1em; display:inline-block; flex-shrink:0; vertical-align:-0.15em;}
  .icon-btn{
    background:var(--panel); border:1px solid var(--panel-border);
    color:var(--fg); border-radius:10px; padding:8px 12px; font-size:12.5px; font-weight:600;
    cursor:pointer; font-family:'Inter'; display:flex; align-items:center; gap:6px;
    transition:background .15s ease, transform .1s ease;
  }
  .icon-btn:hover{filter:brightness(1.15);}
  .icon-btn:active{transform:scale(0.97);}
  .theme-toggle{
    background:var(--panel); border:1px solid var(--panel-border); color:var(--fg);
    border-radius:10px; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:15px; padding:0; flex-shrink:0;
  }

  main{flex:1; display:flex; flex-direction:column; padding:0 20px 28px;}

  /* ---------- Empty / loader state ---------- */
  .loader-wrap{flex:1; display:flex; flex-direction:column; justify-content:center; gap:18px; padding:20px 0 60px;}
  .loader-wrap h1{font-family:'Noto Serif KR'; font-size:26px; font-weight:700; margin:0 0 4px; color:var(--fg); line-height:1.35;}
  .loader-wrap p{margin:0; font-size:13.5px; color:var(--fg-dim); line-height:1.6;}
  textarea{
    width:100%; min-height:220px; resize:vertical;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:12px;
    color:var(--fg); font-family:'Inter'; font-size:13.5px; padding:14px; line-height:1.6; outline:none;
  }
  textarea:focus{border-color:var(--fg-dim);}
  textarea::placeholder{color:var(--fg-dimmer);}
  .format-hint{
    font-size:11.5px; color:var(--fg-dimmer); background:var(--panel);
    border:1px dashed var(--panel-border); border-radius:8px; padding:10px 12px; line-height:1.6; font-family:monospace;
    white-space:pre-wrap;
  }
  .primary-btn{
    background:var(--fg); color:var(--bg); border:none; border-radius:12px;
    padding:15px; font-size:14.5px; font-weight:700; cursor:pointer; font-family:'Inter';
    transition:transform .1s ease, opacity .15s ease;
  }
  .primary-btn:hover{opacity:0.9;}
  .primary-btn:active{transform:scale(0.98);}
  .primary-btn:disabled{opacity:0.35; cursor:not-allowed;}
  .ghost-btn{
    background:transparent; border:1px solid var(--panel-border); color:var(--fg);
    border-radius:12px; padding:13px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:'Inter';
  }
  .row{display:flex; gap:10px;}
  .row > *{flex:1;}
  .error-msg{color:var(--red); background:rgba(193,68,46,0.12); border:1px solid rgba(193,68,46,0.3); border-radius:8px; padding:10px 12px; font-size:12.5px;}
  .saved-note{font-size:11.5px; color:var(--fg-dimmer); text-align:center;}

  /* ---------- Chapter select ---------- */
  .select-header{padding:8px 0 18px;}
  .welcome-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .welcome-inner{max-width:440px; width:100%; text-align:center;}
  .welcome-eyebrow{font-size:11px; letter-spacing:0.14em; color:var(--fg-dimmer); font-weight:700; margin:0 0 10px;}
  .welcome-name-input{
    width:100%; background:transparent; border:none; border-bottom:2px dashed var(--panel-border);
    font-family:'Noto Serif KR'; font-weight:900; font-size:clamp(28px,7vw,40px); text-align:center;
    color:var(--fg); padding:6px 0 12px; outline:none;
  }
  .welcome-name-input::placeholder{color:var(--fg-dimmer); opacity:0.6;}
  .welcome-sub{font-size:13px; color:var(--fg-dim); line-height:1.6; margin:16px 0 28px;}
  .welcome-actions{display:flex; gap:10px; flex-direction:column;}
  .onboarding-wrap{padding:8px 0 30px; display:flex; flex-direction:column; gap:4px;}
  .onboarding-section{
    background:var(--panel); border:1px solid var(--panel-border); border-radius:14px;
    padding:16px 18px; margin-top:12px;
  }
  .onboarding-section h3{margin:0 0 6px; font-size:15px;}
  .onboarding-section p{margin:0; font-size:13px; color:var(--fg-dim); line-height:1.6;}
  .select-header h1{font-family:'Noto Serif KR'; font-size:24px; margin:0 0 6px; font-weight:900;}
  .select-header p{margin:0; font-size:12.5px; color:var(--fg-dim);}

  .ticket-grid{display:flex; flex-direction:column; gap:10px;}
  .ticket{
    position:relative; background:var(--card-back-bg); color:var(--card-back-fg); border-radius:14px;
    padding:16px 18px; cursor:pointer; overflow:hidden;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    border:1px solid var(--panel-border);
    transition:transform .12s ease;
  }
  .ticket:active{transform:scale(0.985);}
  .ticket::before{content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:rgba(128,128,128,0.3);}
  .ticket.has-progress::before{background:var(--jade);}
  .ticket.has-danger::before{background:var(--red);}
  .ticket.pinned::before{background:var(--gold);}
  .ticket .t-left{display:flex; flex-direction:column; gap:5px; padding-left:8px;}
  .ticket .t-num{font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-dimmer); font-weight:700;}
  .ticket .t-name{font-family:'Noto Serif KR'; font-size:17px; font-weight:700;}
  .pin-ico{color:var(--gold); width:15px; height:15px;}
  .t-fav-row{line-height:1; margin-bottom:2px;}
  .ticket .t-meta{font-size:11.5px; color:var(--fg-dim); display:flex; gap:8px; align-items:center;}
  .ticket .t-right{display:flex; flex-direction:column; align-items:flex-end; gap:4px;}

  /* Folder deck cards: square tile (matches the 200x200 reference the art was drawn at),
     folder art fills the tile as a backdrop, text sits on top at a per-shape offset measured
     from the ticket's bottom-left corner. Offsets are expressed as % of ticket size so they
     stay correct at any rendered size, not just the 200px reference. */
  .folder-ticket{
    aspect-ratio:1/1; padding:0; align-items:stretch; justify-content:flex-start;
    background:none; border:none; container-type:inline-size;
  }
  .folder-ticket::before{display:none;}
  .folder-ticket .folder-art{
    position:absolute; inset:0; width:100%; height:100%; z-index:0; pointer-events:none;
  }
  .folder-ticket .t-left{
    position:absolute; z-index:1; width:calc(100% - 24px);
    display:flex; flex-direction:column; gap:2.5cqw;
  }
  /* Shape X (Classic): 20px up from bottom, 50px from left, on a 200px reference tile */
  .folder-ticket[data-folder-shape="x"] .t-left{ left:25%; bottom:10%; }
  /* Shape Y (Frosted): left matches Z's, bottom matches X's, per request */
  .folder-ticket[data-folder-shape="y"] .t-left{ left:10%; bottom:10%; }
  /* Shape Z (Layered): matched to Y's offset per request, both now sit at the same bottom position */
  .folder-ticket[data-folder-shape="z"] .t-left{ left:10%; bottom:10%; }
  .folder-ticket .t-name{color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.4); font-size:8.5cqw;}
  .folder-ticket .t-meta{color:rgba(255,255,255,0.85); text-shadow:0 1px 2px rgba(0,0,0,0.4); font-size:5.75cqw;}
  .ticket .t-acc{font-family:'Noto Serif KR'; font-size:20px; font-weight:900;}
  .ticket .t-acc.na{color:var(--fg-dimmer); font-size:13px; font-weight:600; font-family:'Inter';}
  .ticket .t-flag{font-size:10.5px; color:var(--red); font-weight:700; display:flex; align-items:center; gap:3px;}
  .ticket .mode-row{display:flex; gap:6px; margin-top:2px;}
  .ticket.picked{outline:2px solid var(--jade); outline-offset:-1px;}
  .ticket.picked::before{background:var(--jade);}
  .pick-check{
    width:24px; height:24px; border-radius:7px; border:1.5px solid var(--panel-border);
    display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:var(--bg);
    transition:all .15s ease;
  }
  .pick-check.on{background:var(--jade); border-color:var(--jade); color:white;}
  .mode-pill{
    font-size:10px; font-weight:700; padding:4px 8px; border-radius:20px; cursor:pointer;
    background:rgba(128,128,128,0.12); color:inherit; border:none; font-family:'Inter';
  }
  .mode-pill:hover{background:rgba(128,128,128,0.22);}

  .final-ticket{
    background:var(--card-back-bg); color:var(--card-back-fg); border:1px solid var(--panel-border);
    border-radius:14px; padding:18px; cursor:pointer; text-align:left;
    display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:14px;
    transition:transform .12s ease;
  }
  .final-ticket:active{transform:scale(0.985);}
  .final-ticket .t-name{font-family:'Noto Serif KR'; font-size:18px; font-weight:700; margin-bottom:4px;}
  .final-ticket .t-meta{font-size:11.5px; color:rgba(128,128,128,0.8);}
  .final-ticket .stamp{
    font-family:'Noto Serif KR'; font-size:11px; font-weight:900; color:var(--gold);
    border:1.5px solid var(--gold); border-radius:8px; padding:5px 9px; letter-spacing:0.05em;
    transform:rotate(-6deg); white-space:nowrap; flex-shrink:0;
  }

  .options-bar{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .toggle-chip{
    background:var(--panel); border:1px solid var(--panel-border); color:var(--fg-dim);
    border-radius:20px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter';
    display:flex; align-items:center; gap:6px; transition:all .15s ease;
  }
  .toggle-chip.active{background:var(--fg); color:var(--bg); border-color:var(--fg);}
  .direction-toggle{display:flex; gap:8px; margin:2px 0 14px;}
  .direction-toggle .toggle-chip{flex:1; justify-content:center;}

  /* mode picker sheet */
  .sheet-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; display:flex; align-items:flex-end; justify-content:center;}
  .sheet{
    background:var(--bg); width:100%; max-width:640px; border-radius:20px 20px 0 0; padding:20px 20px 28px;
    border:1px solid var(--panel-border); border-bottom:none;
  }
  .sheet h3{font-family:'Noto Serif KR'; font-size:17px; margin:0 0 4px;}
  .sheet .sub{font-size:12px; color:var(--fg-dim); margin:0 0 16px;}
  .sheet-option{
    display:flex; align-items:center; gap:12px; padding:14px; border-radius:12px; background:var(--panel);
    border:1px solid var(--panel-border); margin-bottom:8px; cursor:pointer;
  }
  .sheet-option .emoji{font-size:20px;}
  .sheet-option .label{font-weight:700; font-size:13.5px;}
  .sheet-option .desc{font-size:11px; color:var(--fg-dim); margin-top:2px;}
  .sheet-cancel{width:100%; text-align:center; padding:12px; color:var(--fg-dim); background:none; border:none; font-size:13px; font-family:'Inter'; cursor:pointer;}

  /* Slide-out side menu: overlays with a dim backdrop, panel slides in from the right.
     Full-screen takeover below 640px (mobile); a fixed-width partial panel above that. */
  .side-menu-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .side-menu-overlay.open{opacity:1; pointer-events:auto;}
  .side-menu-panel{
    position:fixed; top:0; right:0; height:100%; width:100%; max-width:400px;
    background:var(--bg); border-left:1px solid var(--panel-border);
    transform:translateX(100%); transition:transform .25s ease;
    display:flex; flex-direction:column; overflow-y:auto;
  }
  .side-menu-overlay.open .side-menu-panel{transform:translateX(0);}
  @media (max-width:639px){
    .side-menu-panel{max-width:100%;}
  }
  .side-menu-header{
    display:flex; align-items:center; justify-content:space-between; padding:18px 18px 14px;
    border-bottom:1px solid var(--panel-border); flex-shrink:0;
  }
  .side-menu-header h2{font-family:'Noto Serif KR'; font-size:19px; margin:0;}
  .side-menu-close{background:none; border:none; color:var(--fg-dim); cursor:pointer; padding:6px;}
  .side-menu-body{padding:18px; display:flex; flex-direction:column; gap:22px; flex:1;}
  .side-menu-section{display:flex; flex-direction:column; gap:8px;}
  .side-menu-section-label{font-size:11px; letter-spacing:0.1em; color:var(--fg-dimmer); font-weight:700; margin-bottom:2px;}
  /* Must sit above the side menu (z-index 60) since it's opened FROM the menu and
     should always appear in front of it, not underneath. */
  .folder-editor-overlay{z-index:70;}
  @media (max-width:639px){
    .folder-editor-overlay{align-items:stretch;}
    .folder-editor-sheet{max-width:100%; height:100%; border-radius:0; overflow-y:auto; display:flex; flex-direction:column; justify-content:center;}
  }
  .shortcut-list{display:flex; flex-direction:column; gap:10px; margin:14px 0;}
  .shortcut-row{display:flex; align-items:center; gap:12px; font-size:13.5px;}
  .shortcut-row .key{
    font-family:monospace; font-weight:700; font-size:12px; background:var(--panel);
    border:1px solid var(--panel-border); border-radius:6px; padding:4px 9px; min-width:56px;
    text-align:center; flex-shrink:0;
  }

  /* ---------- Drill screen (shared header) ---------- */
  .drill-header{display:flex; align-items:center; justify-content:space-between; padding:6px 0 16px; gap:12px;}
  .back-link{background:none; border:none; color:var(--fg-dim); font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter'; display:flex; align-items:center; gap:5px; padding:6px 0;}
  .back-link:hover{color:var(--fg);}
  .progress-track{flex:1; height:5px; background:var(--fg-faint); border-radius:3px; overflow:hidden; margin:0 4px;}
  .progress-fill{height:100%; background:var(--fg); border-radius:3px; transition:width .25s ease;}
  .counter{font-size:12px; color:var(--fg-dim); font-weight:600; white-space:nowrap; font-variant-numeric:tabular-nums;}

  .timer-bar-wrap{height:3px; background:var(--fg-faint); border-radius:2px; overflow:hidden; margin-bottom:18px;}
  .timer-bar{height:100%; background:var(--gold); transition:width 1s linear;}
  .timer-bar.warn{background:var(--red);}

  /* ---------- Flip card mode ---------- */
  .card-stage{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 0 20px; perspective:1400px;}
  .flashcard-shell{position:relative; width:100%; max-width:420px; aspect-ratio:1.5/1;}
  .flashcard{
    width:100%; height:100%; position:relative; cursor:pointer;
    transform-style:preserve-3d; transition:transform .45s cubic-bezier(.2,.8,.2,1);
  }
  .flashcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:20px;
    background:var(--card-front-bg); color:var(--card-front-fg);
    box-shadow:-10px 18px 14px rgba(0,0,0,0.2);
    overflow:hidden;
  }
  .face-content{
    position:absolute; inset:0; border-radius:20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:28px; background:var(--card-front-bg); color:var(--card-front-fg);
  }
  .face.back{transform:rotateY(180deg); background:var(--card-back-bg);}
  .face.back .face-content{background:var(--card-back-bg); color:var(--card-back-fg);}
  .face .chapter-tag{position:absolute; top:16px; left:18px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(128,128,128,0.6); font-weight:700;}
  .word-term{font-family:'Noto Serif KR'; font-weight:700; font-size:clamp(28px,7vw,40px); line-height:1.3; word-break:keep-all;}
  .word-def{font-size:clamp(16px,4vw,20px); line-height:1.5; font-weight:500; word-break:keep-all;}
  .tap-hint{position:absolute; bottom:16px; font-size:10.5px; color:rgba(128,128,128,0.55); font-weight:600; letter-spacing:0.04em;}

  /* Fold corner + bookmark tap-zone: fixed to flashcard-shell (NOT the rotating .flashcard), so they
     never move or mirror when the card flips — same physical spot on screen in both flip states. */
  .fold-b{
    position:absolute; top:0; right:0; width:20%; height:20%;
    clip-path: polygon(0 0, 100% 0, 100% 100%);
    background: var(--bg);
    z-index:2; opacity:0; transition:opacity .2s ease; pointer-events:none;
  }
  .fold-c{
    position:absolute; top:0; right:0; width:20%; height:20%;
    clip-path: polygon(0 0, 0 100%, 100% 100%);
    background:
      linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.55)),
      var(--card-front-bg);
    z-index:3; opacity:0; transition:opacity .2s ease; pointer-events:none;
    border-radius:0 0 0 40%;
    box-shadow: -2px 2px 4px rgba(0,0,0,0.2);
  }
  .fold-b.on{opacity:1;}
  .fold-c.on{opacity:1;}
  .mc-prompt-card.flagged .fold-b{opacity:1;}
  .mc-prompt-card.flagged .fold-c{opacity:1;}
  .bookmark-zone{
    position:absolute; top:0; right:0; width:52px; height:52px; cursor:pointer;
    background:none; border:none; padding:0; z-index:4;
  }
  .bookmark-icon{
    position:absolute; top:10px; right:12px; width:13px; height:17px; pointer-events:none;
    opacity:0.35; color:var(--fg); transition:opacity .15s ease;
  }
  .bookmark-icon svg{width:100%; height:100%; display:block;}
  .bookmark-icon .ribbon-fill{fill:none; stroke:currentColor; stroke-width:1.6;}
  .bookmark-zone:hover .bookmark-icon{opacity:0.6;}

  .action-row{display:flex; gap:12px; width:100%; max-width:420px; margin-top:22px;}
  .action-btn{
    flex:1; border:none; border-radius:14px; padding:16px 10px; font-family:'Inter'; font-weight:700; font-size:14px;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:transform .1s ease, opacity .15s ease;
  }
  .action-btn:active{transform:scale(0.96);}
  .action-btn .big{font-size:20px;}
  .btn-wrong{background:rgba(193,68,46,0.14); color:var(--red); border:1.5px solid rgba(193,68,46,0.4);}
  .btn-correct{background:rgba(91,140,123,0.16); color:var(--jade); border:1.5px solid rgba(91,140,123,0.45);}
  .hint-row{text-align:center; font-size:11.5px; color:var(--fg-dimmer); margin-top:10px;}

  /* ---------- Multiple choice mode ---------- */
  .mc-stage{flex:1; display:flex; flex-direction:column; padding:10px 0 20px;}
  .mc-prompt-card{
    background:var(--card-front-bg); border-radius:20px;
    text-align:center; margin-bottom:22px; position:relative;
    box-shadow:-10px 18px 14px rgba(0,0,0,0.18);
    overflow:hidden;
  }
  .mc-prompt-content{
    position:relative; color:var(--card-front-fg); padding:36px 24px; border-radius:20px;
  }
  .mc-prompt-content .chapter-tag{position:absolute; top:14px; left:16px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(128,128,128,0.6); font-weight:700;}
  .mc-options{display:flex; flex-direction:column; gap:10px;}
  .mc-option{
    background:var(--panel); border:1.5px solid var(--panel-border); color:var(--fg);
    border-radius:12px; padding:15px 16px; font-size:14px; font-weight:500; text-align:left; cursor:pointer;
    font-family:'Inter'; transition:all .15s ease; line-height:1.4;
  }
  .mc-option:hover{border-color:var(--fg-dim);}
  .mc-option.correct{background:rgba(91,140,123,0.22); border-color:var(--jade); color:var(--jade); font-weight:700;}
  .mc-option.wrong{background:rgba(193,68,46,0.18); border-color:var(--red); color:var(--red); font-weight:700;}
  .mc-option.disabled{cursor:default; opacity:0.6;}
  .mc-option.disabled:hover{border-color:var(--panel-border);}
  .mc-next-hint{text-align:center; font-size:12px; color:var(--fg-dimmer); margin-top:16px;}

  /* ---------- Matching mode ---------- */
  .match-stage{flex:1; display:flex; flex-direction:column; padding:6px 0 20px;}
  .match-cols{display:flex; gap:12px;}
  .match-col{flex:1; display:flex; flex-direction:column; gap:8px;}
  .match-tile{
    background:var(--panel); border:1.5px solid var(--panel-border); color:var(--fg);
    border-radius:10px; padding:13px 12px; font-size:13px; font-weight:600; text-align:center; cursor:pointer;
    font-family:'Inter'; transition:all .15s ease; min-height:48px; display:flex; align-items:center; justify-content:center;
    line-height:1.3; word-break:keep-all;
  }
  .match-tile.kr{font-family:'Noto Serif KR'; font-size:15px;}
  .match-tile:hover{border-color:var(--fg-dim);}
  .match-tile.selected{background:var(--fg); color:var(--bg); border-color:var(--fg);}
  .match-tile.locked{background:rgba(91,140,123,0.18); border-color:var(--jade); color:var(--jade); opacity:0.55; cursor:default; pointer-events:none;}
  .match-tile.shake{animation:shake .35s ease;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }
  .match-progress{text-align:center; font-size:12px; color:var(--fg-dim); margin-top:16px; font-weight:600;}

  /* ---------- Session summary ---------- */
  .summary-wrap{flex:1; display:flex; flex-direction:column; justify-content:center; gap:22px; padding:20px 0;}
  .summary-wrap h1{font-family:'Noto Serif KR'; font-size:28px; margin:0; font-weight:700;}
  .summary-stats{display:flex; gap:12px;}
  .stat-box{flex:1; background:var(--panel); border:1px solid var(--panel-border); border-radius:14px; padding:16px; text-align:center;}
  .stat-box .n{font-family:'Noto Serif KR'; font-size:26px; font-weight:900;}
  .stat-box .l{font-size:10.5px; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px; font-weight:600;}
  .stat-box.red .n{color:var(--red);}
  .stat-box.jade .n{color:var(--jade);}
  .miss-list{display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto;}
  .miss-row{display:flex; justify-content:space-between; gap:10px; background:var(--panel); border-radius:10px; padding:10px 14px; font-size:13px;}
  .miss-row .k{font-family:'Noto Serif KR'; font-weight:600;}
  .miss-row .m{color:var(--fg-dim); text-align:right;}

  /* ---------- Data manage screen ---------- */
  .manage-wrap{padding:8px 0 30px; display:flex; flex-direction:column; gap:16px;}
  .manage-wrap h1{font-family:'Noto Serif KR'; font-size:22px; margin:0 0 2px; font-weight:700;}
  .manage-wrap p{margin:0; font-size:12.5px; color:var(--fg-dim); line-height:1.6;}
  .danger-zone{border:1px solid rgba(193,68,46,0.3); background:rgba(193,68,46,0.06); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:10px; margin-top:14px;}

  /* ---------- Chapter detail screen ---------- */
  .chapter-title-row{margin-top:6px;}
  .chapter-title-row h1{margin:0;}
  .word-list{display:flex; flex-direction:column; gap:8px; margin-top:16px;}
  .word-view-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:12px 16px;
  }
  .word-view-row.flagged{border-color:rgba(193,68,46,0.35); background:rgba(193,68,46,0.07);}
  .wv-text{display:flex; justify-content:space-between; align-items:center; gap:14px; flex:1; min-width:0;}
  .wv-term{font-family:'Noto Serif KR'; font-weight:700; font-size:15px; flex-shrink:0;}
  .wv-def{color:var(--fg-dim); font-size:13.5px; text-align:right;}
  .wv-reason{font-size:10.5px; color:var(--red); opacity:0.75; margin-top:3px;}
  .wv-flag-btn{
    flex-shrink:0; width:32px; height:32px; border-radius:8px; border:1px solid var(--panel-border);
    background:var(--panel); cursor:pointer; padding:6px; display:flex; align-items:center; justify-content:center;
    color:var(--fg-dimmer); transition:color .15s ease, opacity .15s ease;
  }
  .wv-flag-btn svg{width:100%; height:100%; display:block;}
  .wv-flag-btn .ribbon-fill{fill:none; stroke:currentColor; stroke-width:1.6;}
  .wv-flag-btn.on{color:var(--gold); border-color:rgba(199,154,62,0.4);}
  .wv-flag-btn.on .ribbon-fill{fill:currentColor;}
  .flagged-group-header{
    display:flex; justify-content:space-between; align-items:baseline;
    margin:20px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--panel-border);
    font-weight:700; font-size:14px;
  }
  .flagged-group-header .fg-count{font-size:11px; color:var(--fg-dim); font-weight:600;}
  .word-edit-row{display:flex; gap:8px; align-items:center;}
  .word-edit-input{
    flex:1; min-width:0; background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
    padding:10px 12px; color:var(--fg); font-family:'Inter'; font-size:13.5px;
  }
  .word-edit-input.kr{font-family:'Noto Serif KR'; font-weight:700;}
  .word-del-btn{
    flex-shrink:0; width:38px; height:38px; border-radius:10px; border:1px solid var(--panel-border);
    background:var(--panel); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center;
  }
  .word-del-btn.add{color:var(--jade); border-color:rgba(91,140,123,0.4); font-size:20px; font-weight:700;}
  .add-row{margin-top:4px;}
  .bulk-add-block{margin-top:18px;}
  .reorder-row{
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:12px 16px;
  }
  .reorder-info .t-num{font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-dimmer); font-weight:700;}
  .reorder-info .t-name{font-family:'Noto Serif KR'; font-size:15px; font-weight:700; margin:3px 0;}
  .reorder-info .t-meta{font-size:11.5px; color:var(--fg-dim);}
  .reorder-controls{display:flex; flex-direction:column; gap:4px; flex-shrink:0;}
  .reorder-btn{
    width:36px; height:30px; border-radius:8px; border:1px solid var(--panel-border);
    background:var(--panel); color:var(--fg); cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center;
  }
  .reorder-btn:disabled{opacity:0.25; cursor:not-allowed;}

  /* Manage Library: drag-and-drop deck reordering. Pointer-based (not native HTML5 DnD)
     so it works consistently on touch as well as mouse -- native drag-and-drop is
     unreliable enough on mobile that it's not worth relying on for a study app that's
     mostly used on phones. */
  .lib-manage-row{
    display:flex; align-items:center; gap:10px; background:var(--panel);
    border:1px solid var(--panel-border); border-radius:12px; padding:10px 12px;
    touch-action:none; user-select:none;
  }
  .lib-manage-row.dragging{opacity:0.4;}
  .lib-manage-row.drop-target{border-color:var(--jade); border-width:2px;}
  .lib-drag-handle{
    display:flex; align-items:center; justify-content:center; width:28px; height:36px;
    color:var(--fg-dimmer); cursor:grab; flex-shrink:0; touch-action:none;
  }
  .lib-manage-row .lib-thumb{width:40px; height:40px; border-radius:8px; flex-shrink:0; overflow:hidden;}
  .lib-manage-row .lib-thumb svg{width:100%; height:100%; display:block;}
  .lib-manage-info{flex:1; min-width:0;}
  .lib-manage-info .t-name{font-family:'Noto Serif KR'; font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lib-manage-info .t-meta{font-size:11px; color:var(--fg-dim);}
  .lib-manage-del{
    width:36px; height:36px; border-radius:8px; border:1px solid rgba(193,68,46,0.3);
    background:none; color:var(--red); cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }

  .danger-zone .dz-title{font-size:12.5px; font-weight:700; color:var(--red);}
  .reset-progress-zone{border:1px solid var(--panel-border); background:var(--panel); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:8px; margin-top:18px;}
  .folder-picker{display:flex; flex-direction:column; gap:10px; margin:10px 0 16px;}
  .folder-picker-preview{width:96px; height:96px; margin:0 auto 4px;}
  .folder-picker-preview svg{width:100%; height:100%; display:block;}
  .toggle-row{display:flex; gap:6px; flex-wrap:wrap; justify-content:center;}
  .hue-row{display:flex; align-items:center; gap:10px; justify-content:center; margin-top:2px;}
  .hue-row .hue-label{font-size:11.5px; color:var(--fg-dim); font-weight:600;}
  .hue-slider-input{
    -webkit-appearance:none; appearance:none; width:140px; height:8px; border-radius:8px; outline:none;
    background:linear-gradient(to right, #ff4d4d, #ffb84d, #fff94d, #6fdb6f, #4d9eff, #b86fff, #ff4d4d);
  }
  .hue-slider-input::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:16px; height:16px; border-radius:50%;
    background:#fff; border:2px solid var(--panel-border); box-shadow:0 1px 4px rgba(0,0,0,0.4); cursor:pointer;
  }
  .shuffle-flip{transform:scaleX(-1);}
  .reset-progress-zone .dz-title{font-size:12.5px; font-weight:700; letter-spacing:0.03em;}
  .status-line{font-size:11.5px; color:var(--fg-dimmer); display:flex; align-items:center; gap:6px;}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--jade); flex-shrink:0;}

  .deck-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  @media (min-width:520px){
    .ticket-grid{display:grid; grid-template-columns:1fr 1fr;}
    .deck-grid{grid-template-columns:1fr 1fr 1fr;}
  }
</style>

<body>
<div id="app"></div>

<script>
(function(){

  var LIBRARY_INDEX_KEY = 'vocab-drill-library';
  var GLOBAL_PREFS_KEY = 'vocab-drill-prefs';
  function deckKey(id){ return 'vocab-drill-deck:' + id; }

  // ---- Universal storage adapter ----
  // Anthropic's window.storage only exists inside a Claude artifact preview. Everywhere
  // else (GitHub Pages, a downloaded local file, any other static host) it's simply
  // undefined. Rather than the app going into a permanent "no storage available" state
  // outside that one context, fall back to the browser's own localStorage -- same
  // promise-based interface either way, so nothing else in the app needs to know or care
  // which backend is actually in use.
  //
  // Important: these are two genuinely separate storage systems. A deck saved via
  // window.storage (inside Claude) and one saved via localStorage (e.g. on GitHub Pages)
  // do NOT share data -- moving between the two requires an explicit export/import, same
  // as moving between two different devices.
  function getStorage(){
    if(window.storage) return window.storage;
    var fallback = {
      isNative: false,
      get: function(key){
        try{
          var val = localStorage.getItem(key);
          return Promise.resolve(val ? {key:key, value:val} : null);
        }catch(e){ return Promise.reject(e); }
      },
      set: function(key, value){
        try{
          localStorage.setItem(key, value);
          return Promise.resolve({key:key, value:value});
        }catch(e){ return Promise.reject(e); }
      },
      delete: function(key){
        try{
          localStorage.removeItem(key);
          return Promise.resolve({key:key, deleted:true});
        }catch(e){ return Promise.reject(e); }
      }
    };
    return fallback;
  }
  var storage = getStorage();
  storage.isNative = !!window.storage;

  var state = {
    screen: 'loading',     // loading | welcome | onboarding | library | loader | select | drill | summary | manage
    activeDeckId: null,
    libraryIndex: [],      // [{id, name, updatedAt}]
    newDeckPromptOpen: false,
    newDeckDraftFolder: null,
    newDeckDraftName: '',
    sideMenuOpen: false,
    importCollision: null,
    sideMenuContext: null, // 'deck' | 'library'
    folderEditorOpen: false,
    appName: 'Vocab Drill',
    editingAppName: false,
    welcomeNameDraft: '',
    onboardingSeen: false,
    chapters: {},
    chapterOrder: [],
    session: null,
    timerEnabled: false,
    timerSeconds: 12,
    rawInput: '',
    addMoreInput: '',
    theme: 'dark',
    deckName: '',
    editingDeckName: false,
    modeSheet: null,       // {chapterKeys, label} while picking a drill mode
    modeSheetReversed: false,
    customTestSelection: [],
    exportSelection: [],
    activeChapter: null,
    chapterEditMode: false,
    editingChapterName: false,
    chapterBulkInput: '',
    storageStatus: 'checking', // checking | ok | unavailable
    keyboardShortcutsEnabled: true,
    dismissShortcutHints: false,
    showShortcutHint: false,
    shortcutHintMode: null
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }

  // Best-effort "is this a desktop, not a touch phone" check. No single signal is
  // fully reliable (tablets, touch laptops, resized windows all exist), so this
  // combines lack of touch support with a reasonably wide viewport — good enough
  // to avoid showing keyboard hints to someone who can't use a keyboard anyway.
  function isDesktopLike(){
    var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
    var wideEnough = window.innerWidth >= 900;
    return !hasTouch && wideEnough;
  }

  // ---------------- Parsing ----------------
  function parseVocabText(text, defaultChapter){
    var lines = text.split('\n');
    var chapters = {}; var order = []; var current = null;
    lines.forEach(function(line){
      var trimmed = line.trim();
      if(!trimmed) return;
      if(trimmed.includes('|')){
        if(!current){ current = defaultChapter || 'CH1'; if(order.indexOf(current)===-1){order.push(current); chapters[current]=[];} }
        var parts = trimmed.split('|');
        var term = parts[0].trim();
        var def = parts.slice(1).join('|').trim();
        if(term && def) chapters[current].push({ id: uid(), term: term, def: def, box:1, seen:0, correct:0, wrong:0, flagged:false });
      } else {
        current = trimmed;
        if(order.indexOf(current)===-1){ order.push(current); chapters[current] = []; }
      }
    });
    return { chapters: chapters, order: order };
  }

  // Merge freshly parsed vocab into existing state without touching existing progress.
  // Existing chapters get new words appended (skipping exact term+def duplicates).
  // New chapter headers get appended to chapterOrder in the order encountered.
  function mergeParsedVocab(parsed){
    var addedWords = 0, addedChapters = 0, skippedDupes = 0;
    parsed.order.forEach(function(ck){
      if(state.chapterOrder.indexOf(ck) === -1){
        state.chapterOrder.push(ck);
        state.chapters[ck] = [];
        addedChapters++;
      }
      var existing = state.chapters[ck];
      parsed.chapters[ck].forEach(function(w){
        var dupe = existing.some(function(ew){ return ew.term === w.term && ew.def === w.def; });
        if(dupe){ skippedDupes++; return; }
        existing.push(w);
        addedWords++;
      });
    });
    return { addedWords: addedWords, addedChapters: addedChapters, skippedDupes: skippedDupes };
  }

  // Reset progress (seen/correct/wrong/box/flagged) on every word in every chapter,
  // WITHOUT touching chapters, words, or their id/term/def. This is the "operates on
  // whichever deck is currently loaded" pattern — deck-agnostic by construction, so it
  // needs no changes when multi-deck support lands later.
  function resetAllProgress(){
    var wordCount = 0;
    state.chapterOrder.forEach(function(ck){
      state.chapters[ck].forEach(function(w){
        w.box = 1; w.seen = 0; w.correct = 0; w.wrong = 0; w.flagged = false;
        wordCount++;
      });
    });
    return { wordCount: wordCount };
  }

  // ---------------- Persistent storage (window.storage) ----------------
  // ---------------- In-app toast (native alert() is unreliable in sandboxed artifacts) ----------------
  var toastTimeout = null;
  function showToast(message){
    state.toast = message;
    render();
    if(toastTimeout) clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function(){ state.toast = null; render(); }, 2600);
  }
  function renderToast(){
    return el('div',{style:'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--fg); color:var(--bg); padding:12px 20px; border-radius:12px; font-size:13px; font-weight:600; max-width:85%; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.3); z-index:60;'},[text(state.toast)]);
  }

  // ---------------- In-app confirm (native confirm() is unreliable in sandboxed artifacts) ----------------
  function askConfirm(message, onYes){
    state.confirmDialog = { message: message, onYes: onYes };
    render();
  }
  function renderConfirmDialog(){
    var cd = state.confirmDialog;
    // z-index 70: must sit above the side menu (60), since any danger-zone or destructive
    // action triggered from inside the menu needs its confirm to actually be visible and
    // clickable, not silently buried behind the still-open menu.
    var overlay = el('div',{class:'sheet-overlay', style:'z-index:70;', onclick:function(e){ if(e.target === e.currentTarget){ state.confirmDialog=null; render(); } }});
    var sheet = el('div',{class:'sheet'});
    sheet.appendChild(el('h3',{},[text('Are you sure?')]));
    sheet.appendChild(el('p',{class:'sub'},[text(cd.message)]));
    sheet.appendChild(el('div',{class:'row'},[
      el('button',{class:'ghost-btn', onclick:function(){ state.confirmDialog=null; render(); }},[text('Cancel')]),
      el('button',{class:'primary-btn', style:'background:var(--red); color:white;', onclick:function(){
        var fn = cd.onYes; state.confirmDialog=null; fn();
      }},[text('Yes, do it')])
    ]));
    overlay.appendChild(sheet);
    return overlay;
  }

  // Three-choice prompt for resolving one colliding deck at a time during a library
  // import, rather than the usual yes/no confirm dialog.
  function renderImportCollisionDialog(){
    var ic = state.importCollision;
    var overlay = el('div',{class:'sheet-overlay', style:'z-index:80;'});
    var sheet = el('div',{class:'sheet'});
    sheet.appendChild(el('h3',{},[text('Deck already exists')]));
    sheet.appendChild(el('p',{class:'sub'},[text('A deck named "' + ic.existing.name + '" already exists in your library. What do you want to do with the incoming copy?')]));
    function choose(choice){
      var fn = ic.onChoice;
      state.importCollision = null;
      fn(choice);
    }
    sheet.appendChild(el('div',{class:'options-bar', style:'flex-direction:column; gap:8px;'},[
      el('button',{class:'ghost-btn', onclick:function(){ choose('skip'); }},[text('Skip — keep my existing deck')]),
      el('button',{class:'ghost-btn', style:'border-color:rgba(193,68,46,0.4); color:var(--red);', onclick:function(){ choose('overwrite'); }},[text('Overwrite my existing deck')]),
      el('button',{class:'primary-btn', onclick:function(){ choose('copy'); }},[text('Import as a copy ("' + ic.deck.name + '_copy")')])
    ]));
    overlay.appendChild(sheet);
    return overlay;
  }

  // ---- Global prefs (theme/timer) — shared across every library, never deck-specific ----
  function saveGlobalPrefs(){
    var payload = JSON.stringify({theme:state.theme, timerEnabled:state.timerEnabled, timerSeconds:state.timerSeconds, keyboardShortcutsEnabled:state.keyboardShortcutsEnabled, dismissShortcutHints:state.dismissShortcutHints, appName:state.appName, onboardingSeen:state.onboardingSeen});
    storage.set(GLOBAL_PREFS_KEY, payload).catch(function(){});
  }
  function loadGlobalPrefs(){
    return storage.get(GLOBAL_PREFS_KEY).then(function(res){
      if(res && res.value){
        try{
          var data = JSON.parse(res.value);
          if(data.theme) state.theme = data.theme;
          if(typeof data.timerEnabled === 'boolean') state.timerEnabled = data.timerEnabled;
          if(data.timerSeconds) state.timerSeconds = data.timerSeconds;
          if(typeof data.keyboardShortcutsEnabled === 'boolean') state.keyboardShortcutsEnabled = data.keyboardShortcutsEnabled;
          if(typeof data.dismissShortcutHints === 'boolean') state.dismissShortcutHints = data.dismissShortcutHints;
          if(typeof data.appName === 'string' && data.appName) state.appName = data.appName;
          if(typeof data.onboardingSeen === 'boolean') state.onboardingSeen = data.onboardingSeen;
        }catch(e){}
      }
    }).catch(function(){});
  }

  // ---- Library index — the list of decks that exist, independent of any single deck's content ----
  function saveLibraryIndex(){
    var payload = JSON.stringify({decks: state.libraryIndex});
    return storage.set(LIBRARY_INDEX_KEY, payload).catch(function(){
      // Swallow here deliberately: the in-memory state.libraryIndex is still correct
      // and will be retried on the next save trigger. An unhandled rejection would
      // otherwise float silently with no recovery path at all.
      return null;
    });
  }
  function loadLibraryIndex(){
    return storage.get(LIBRARY_INDEX_KEY).then(function(res){
      if(res && res.value){
        try{
          var data = JSON.parse(res.value);
          if(data.decks) state.libraryIndex = data.decks;
        }catch(e){}
      }
    }).catch(function(){});
  }
  function togglePin(id){
    var entry = state.libraryIndex.find(function(d){ return d.id === id; });
    if(entry){
      entry.pinned = !entry.pinned;
      saveLibraryIndex();
    }
    render();
  }

  function touchLibraryEntry(id, name){
    var entry = state.libraryIndex.find(function(d){ return d.id === id; });
    var chapterCount = state.chapterOrder.length;
    var wordCount = 0;
    state.chapterOrder.forEach(function(ck){ wordCount += (state.chapters[ck]||[]).length; });
    if(entry){
      entry.name = name;
      entry.updatedAt = Date.now();
      entry.chapterCount = chapterCount;
      entry.wordCount = wordCount;
    } else {
      state.libraryIndex.push({id:id, name:name, updatedAt:Date.now(), chapterCount:chapterCount, wordCount:wordCount});
    }
    saveLibraryIndex();
  }
  function removeLibraryEntry(id){
    var idx = state.libraryIndex.findIndex(function(d){ return d.id === id; });
    if(idx !== -1) state.libraryIndex.splice(idx,1);
    saveLibraryIndex();
  }

  // ---- Per-deck content (chapters/words/progress) ----
  var libraryIndexSaveTimer = null;
  function scheduleLibraryIndexUpdate(){
    var id = state.activeDeckId;
    if(!id) return;
    var entry = state.libraryIndex.find(function(d){ return d.id === id; });
    var chapterCount = state.chapterOrder.length;
    var wordCount = 0;
    state.chapterOrder.forEach(function(ck){ wordCount += (state.chapters[ck]||[]).length; });
    var name = state.deckName || 'Untitled deck';
    if(entry){
      entry.name = name; entry.updatedAt = Date.now();
      entry.chapterCount = chapterCount; entry.wordCount = wordCount;
    } else {
      state.libraryIndex.push({id:id, name:name, updatedAt:Date.now(), chapterCount:chapterCount, wordCount:wordCount});
    }
    // Debounced: the index is metadata for the library screen, not something that needs
    // a fresh write on every single drill answer. Coalescing these writes keeps the far
    // more important per-deck content save from ever competing with it for a storage slot.
    clearTimeout(libraryIndexSaveTimer);
    libraryIndexSaveTimer = setTimeout(saveLibraryIndex, 800);
  }

  var saveToStorageTimer = null;
  function saveToStorage(){
    if(!state.activeDeckId) return; // nothing loaded yet — nothing to save
    // Debounced at the source: many call sites (word-edit blur handlers especially) can
    // fire in rapid succession -- e.g. tabbing through several words fixing typos would
    // otherwise trigger one full-deck save per field. Coalescing here means every call
    // site benefits automatically without needing its own debounce logic.
    clearTimeout(saveToStorageTimer);
    saveToStorageTimer = setTimeout(function(){
      var payload = JSON.stringify({chapters:state.chapters, chapterOrder:state.chapterOrder, deckName:state.deckName});
      storage.set(deckKey(state.activeDeckId), payload).then(function(res){
        state.storageStatus = res ? 'ok' : 'unavailable';
        if(res){
          // Clear any stale error from a previous failed attempt now that a save has
          // genuinely succeeded -- otherwise old error text can keep showing on screen
          // even after storage has recovered, since nothing else clears it.
          state.saveErrorDetail = null;
          state.saveErrorPayloadSize = null;
        }
        if(state.sideMenuOpen) render();
      }).catch(function(err){
        state.storageStatus = 'unavailable';
        state.saveErrorDetail = (err && (err.message || String(err))) || 'unknown error';
        state.saveErrorPayloadSize = payload.length;
        if(state.sideMenuOpen) render();
      });
    }, 350);
    scheduleLibraryIndexUpdate();
  }

  function loadDeck(id){
    state.activeDeckId = id;
    state.rawInput = '';
    state.loadDeckError = false;
    // Opening an existing deck implicitly abandons any in-progress "new deck" prompt --
    // without this, navigating away without hitting Cancel left it silently open,
    // reappearing exactly as you'd left it whenever you came back to the library.
    state.newDeckPromptOpen = false;
    state.newDeckDraftFolder = null;
    state.newDeckDraftName = '';
    storage.get(deckKey(id)).then(function(res){
      state.storageStatus = 'ok';
      state.chapters = {}; state.chapterOrder = []; state.deckName = '';
      if(res && res.value){
        try{
          var data = JSON.parse(res.value);
          if(data.chapters && data.chapterOrder){
            state.chapters = data.chapters;
            state.chapterOrder = data.chapterOrder;
            if(typeof data.deckName === 'string') state.deckName = data.deckName;
          }
        }catch(e){}
      }
      state.screen = state.chapterOrder.length ? 'select' : 'loader';
      render();
    }).catch(function(err){
      // A failed READ is not the same thing as an empty deck -- the deck's real content
      // may still be sitting safely in storage. Never silently fall through to the blank
      // paste-vocab screen here, since that invites overwriting data that was never lost,
      // just temporarily unreadable. Show a distinct error screen with a retry instead.
      state.storageStatus = 'unavailable';
      state.loadDeckError = true;
      state.loadDeckErrorDetail = (err && (err.message || String(err))) || 'unknown error';
      state.screen = 'loadError';
      render();
    });
  }

  function duplicateDeck(sourceId){
    if(sourceId !== state.activeDeckId) return; // duplication always works on the currently loaded deck
    var newId = uid() + uid();
    var newChapters = {};
    state.chapterOrder.forEach(function(ck){
      newChapters[ck] = state.chapters[ck].map(function(w){
        return { id: uid(), term: w.term, def: w.def, box: w.box, seen: w.seen, correct: w.correct, wrong: w.wrong, flagged: w.flagged };
      });
    });
    var newName = (state.deckName || 'Untitled deck') + ' (copy)';
    var payload = JSON.stringify({chapters: newChapters, chapterOrder: state.chapterOrder.slice(), deckName: newName});
    storage.set(deckKey(newId), payload);
    var chapterCount = state.chapterOrder.length;
    var wordCount = 0;
    state.chapterOrder.forEach(function(ck){ wordCount += newChapters[ck].length; });
    state.libraryIndex.push({id:newId, name:newName, updatedAt:Date.now(), chapterCount:chapterCount, wordCount:wordCount, pinned:false});
    saveLibraryIndex();
    showToast('Duplicated as "' + newName + '"');
    render();
  }

  function createNewDeck(name){
    var id = uid() + uid();
    state.activeDeckId = id;
    state.chapters = {}; state.chapterOrder = []; state.deckName = name || ''; state.rawInput = '';
    state.screen = 'loader';
    var chapterCount = 0, wordCount = 0;
    var cfg = state.newDeckDraftFolder || randomFolderConfig();
    state.libraryIndex.push({
      id:id, name: state.deckName || 'Untitled deck', updatedAt: Date.now(),
      chapterCount: chapterCount, wordCount: wordCount,
      folderShape: cfg.folderShape, folderStyle: cfg.folderStyle, folderHue: cfg.folderHue
    });
    saveLibraryIndex();
    state.newDeckDraftFolder = null;
    saveToStorage();
    render();
  }

  function deleteDeckEntirely(id){
    removeLibraryEntry(id);
    storage.delete(deckKey(id)).catch(function(){});
    if(state.activeDeckId === id){
      state.activeDeckId = null;
      state.chapters = {}; state.chapterOrder = []; state.deckName = '';
    }
  }

  function goToLibrary(){
    state.activeDeckId = null;
    state.screen = 'library';
    render();
  }

  function wipeEverything(){
    var ids = state.libraryIndex.map(function(d){ return d.id; });
    ids.forEach(function(id){
      storage.delete(deckKey(id)).catch(function(){});
    });
    storage.delete(LIBRARY_INDEX_KEY).catch(function(){});
    storage.delete(GLOBAL_PREFS_KEY).catch(function(){});
    state.libraryIndex = [];
    state.activeDeckId = null;
    state.chapters = {}; state.chapterOrder = []; state.deckName = '';
    state.theme = 'dark';
    state.timerEnabled = false; state.timerSeconds = 12;
    state.keyboardShortcutsEnabled = true; state.dismissShortcutHints = false;
    state.appName = 'Vocab Drill';
    state.onboardingSeen = false;
    state.welcomeNameDraft = '';
    applyTheme();
    applyAppName();
    state.screen = 'welcome';
    render();
  }

  function bootApp(){
    loadGlobalPrefs().then(function(){
      applyTheme();
      applyAppName();
      return loadLibraryIndex();
    }).then(function(){
      if(!state.onboardingSeen && state.libraryIndex.length === 0){
        state.welcomeNameDraft = '';
        state.screen = 'welcome';
      } else {
        state.screen = 'library';
      }
      render();
    });
  }

  function exportState(){
    var data = JSON.stringify({kind:'backup', chapters:state.chapters, chapterOrder:state.chapterOrder, deckName:state.deckName});
    var blob = new Blob([data], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = (state.deckName || 'vocab').replace(/[^a-z0-9\-_ ]/gi,'').trim().replace(/\s+/g,'-') + '-progress-backup.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Whole-library export: reads every deck's actual content from storage (only the
  // currently-open deck lives in state.chapters at any given time -- everything else
  // exists solely under its own storage key) and bundles all of them into one JSON file.
  function exportWholeLibrary(){
    var deckIds = state.libraryIndex.map(function(d){ return d.id; });
    var reads = deckIds.map(function(id){
      return storage.get(deckKey(id)).then(function(res){
        var content = null;
        if(res && res.value){ try{ content = JSON.parse(res.value); }catch(e){} }
        var indexEntry = state.libraryIndex.find(function(d){ return d.id === id; });
        return {
          id: id,
          name: (content && content.deckName) || (indexEntry && indexEntry.name) || 'Untitled deck',
          chapters: content ? content.chapters : {},
          chapterOrder: content ? content.chapterOrder : [],
          folderShape: indexEntry ? indexEntry.folderShape : 'x',
          folderStyle: indexEntry ? indexEntry.folderStyle : 'bright',
          folderHue: indexEntry ? indexEntry.folderHue : 0,
          pinned: indexEntry ? !!indexEntry.pinned : false
        };
      });
    });
    Promise.all(reads).then(function(decks){
      var data = JSON.stringify({kind:'library-backup', decks: decks});
      var blob = new Blob([data], {type:'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = (state.appName || 'vocab-drill').replace(/[^a-z0-9\-_ ]/gi,'').trim().replace(/\s+/g,'-') + '-library-backup.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Exported ' + decks.length + ' deck' + (decks.length===1?'':'s') + '~');
    });
  }

  // Build a shareable export: only term/def content for the chosen chapters, with every
  // progress field reset to defaults. Recipients get a clean, unstudied copy of the words —
  // never someone else's study history.
  function exportShareableSet(chapterKeys){
    var chapters = {};
    chapterKeys.forEach(function(ck){
      chapters[ck] = state.chapters[ck].map(function(w){
        return { id: uid(), term: w.term, def: w.def, box:1, seen:0, correct:0, wrong:0, flagged:false };
      });
    });
    var data = JSON.stringify({kind:'shareable', chapters:chapters, chapterOrder:chapterKeys.slice()});
    var blob = new Blob([data], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var namePart = chapterKeys.length === 1 ? chapterKeys[0] : (state.deckName || 'vocab-set');
    a.href = url; a.download = namePart.replace(/[^a-z0-9\-_ ]/gi,'').trim().replace(/\s+/g,'-') + '-shareable.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importStateFile(file){
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var data = JSON.parse(e.target.result);
        if(data.kind === 'library-backup'){
          importWholeLibrary(data);
          return;
        }
        if(!data.chapters || !data.chapterOrder){ throw new Error('bad shape'); }

        if(data.kind === 'shareable'){
          // Shareable sets merge into whatever's currently loaded, same as "Add more vocab" —
          // never wipe the importer's own deck just because they loaded someone else's set.
          var parsed = { chapters: data.chapters, order: data.chapterOrder };
          var result = mergeParsedVocab(parsed);
          state.screen = 'select';
          saveToStorage();
          render();
          var msg = 'Imported ' + result.addedWords + ' word' + (result.addedWords===1?'':'s');
          if(result.addedChapters) msg += ' across ' + result.addedChapters + ' new chapter' + (result.addedChapters===1?'':'s');
          if(result.skippedDupes) msg += ' (' + result.skippedDupes + ' duplicate' + (result.skippedDupes===1?'':'s') + ' skipped)';
          showToast(msg);
        } else {
          // Backup (or untagged legacy export): a full personal-progress restore, so it
          // replaces the currently loaded deck rather than merging into it.
          askConfirm('Import this backup? It will replace everything currently loaded — export first if you want to keep it.', function(){
            state.chapters = data.chapters;
            state.chapterOrder = data.chapterOrder;
            if(typeof data.deckName === 'string') state.deckName = data.deckName;
            state.screen = 'select';
            saveToStorage();
            render();
            showToast('Backup restored');
          });
        }
      }catch(err){ showToast('Could not read that file — is it a vocab export?'); }
    };
    reader.readAsText(file);
  }

  // Whole-library import: walks every deck in the bundle, checking for an ID collision
  // against the currently-existing library. Each collision is resolved individually via
  // an explicit prompt (skip / overwrite / import as a copy) rather than one blanket
  // choice applied to everything, since different decks in the same bundle may warrant
  // different treatment. Non-colliding decks import immediately with no prompt at all.
  function importWholeLibrary(data){
    if(!data.decks || !Array.isArray(data.decks)){ showToast('Could not read that file — is it a library backup?'); return; }
    var queue = data.decks.slice();
    var importedCount = 0;

    function processNext(){
      if(queue.length === 0){
        showToast('Imported ' + importedCount + ' deck' + (importedCount===1?'':'s') + '~');
        render();
        return;
      }
      var deck = queue.shift();
      var existing = state.libraryIndex.find(function(d){ return d.id === deck.id; });
      if(!existing){
        writeImportedDeck(deck, deck.id);
        importedCount++;
        processNext();
      } else {
        renderImportCollisionPrompt(deck, existing, function(choice){
          if(choice === 'skip'){
            // do nothing
          } else if(choice === 'overwrite'){
            writeImportedDeck(deck, deck.id);
            importedCount++;
          } else if(choice === 'copy'){
            var newId = uid() + uid();
            var copyName = deck.name + '_copy';
            writeImportedDeck(Object.assign({}, deck, {name: copyName}), newId);
            importedCount++;
          }
          processNext();
        });
      }
    }
    processNext();
  }

  function writeImportedDeck(deck, id){
    var payload = JSON.stringify({chapters: deck.chapters, chapterOrder: deck.chapterOrder, deckName: deck.name});
    storage.set(deckKey(id), payload);
    var existingIdx = state.libraryIndex.findIndex(function(d){ return d.id === id; });
    var entry = {
      id: id, name: deck.name, updatedAt: Date.now(),
      chapterCount: (deck.chapterOrder||[]).length,
      wordCount: (deck.chapterOrder||[]).reduce(function(sum, ck){ return sum + ((deck.chapters[ck]||[]).length); }, 0),
      folderShape: deck.folderShape || 'x', folderStyle: deck.folderStyle || 'bright', folderHue: deck.folderHue || 0,
      pinned: !!deck.pinned
    };
    if(existingIdx !== -1) state.libraryIndex[existingIdx] = entry;
    else state.libraryIndex.push(entry);
    saveLibraryIndex();
  }

  // A dedicated confirm-style prompt with three choices instead of the usual yes/no,
  // specifically for resolving one colliding deck at a time during a library import.
  function renderImportCollisionPrompt(deck, existing, onChoice){
    state.importCollision = { deck: deck, existing: existing, onChoice: onChoice };
    render();
  }

  // ---------------- Theme ----------------
  function applyTheme(){
    document.documentElement.setAttribute('data-theme', state.theme);
  }
  function applyAppName(){
    document.title = state.appName || 'Vocab Drill';
  }
  function toggleTheme(){
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    saveGlobalPrefs();
    render();
  }

  // ---------------- Session logic (shared) ----------------
  function buildPool(chapterKeys, filterMode){
    var pool = [];
    chapterKeys.forEach(function(ck){
      state.chapters[ck].forEach(function(w){ pool.push({ref:w, chKey:ck}); });
    });
    if(filterMode === 'flagged'){
      pool = pool.filter(function(item){ return item.ref.flagged || item.ref.wrong > item.ref.correct; });
    }
    shuffleArr(pool);
    return pool;
  }
  // Direction-aware display helpers. The underlying word object (term/def) is never
  // mutated or copied here — recordResult still tracks progress on the real object.
  // These only decide which of its two real fields renders as "prompt" vs "answer"
  // for the current session.
  function promptText(w){ return state.session && state.session.reversed ? w.def : w.term; }
  function answerText(w){ return state.session && state.session.reversed ? w.term : w.def; }
  // Styling follows the field, not the prompt/answer role: term always gets the big
  // Korean-font treatment, def always gets the smaller plain-text treatment, regardless
  // of which one is currently playing "prompt" vs "answer" for this session's direction.
  function promptClass(){ return state.session && state.session.reversed ? 'word-def' : 'word-term kr'; }
  function answerClass(){ return state.session && state.session.reversed ? 'word-term kr' : 'word-def'; }
  function shuffleArr(arr){
    for(var i=arr.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
    }
    return arr;
  }

  function startFlipSession(chapterKeys, filterMode, reversed){
    var pool = buildPool(chapterKeys, filterMode);
    if(pool.length === 0){ showToast('No words match this mode yet — flag some or get some wrong first!'); return; }
    state.session = {
      type:'flip', chapterKeys: chapterKeys, mode: filterMode, reversed: !!reversed,
      queue: pool, index: 0, flipped: false,
      correctCount: 0, wrongCount: 0, missed: [],
      timeLeft: state.timerSeconds, timerHandle: null
    };
    state.screen = 'drill';
    maybeShowShortcutHint('flip');
    render();
    if(state.timerEnabled) startTimer();
  }

  function startMCSession(chapterKeys, filterMode, reversed){
    var pool = buildPool(chapterKeys, filterMode);
    if(pool.length === 0){ showToast('No words match this mode yet — flag some or get some wrong first!'); return; }
    state.session = {
      type:'mc', chapterKeys: chapterKeys, mode: filterMode, reversed: !!reversed,
      queue: pool, index: 0,
      correctCount: 0, wrongCount: 0, missed: [],
      answered: false, chosenIdx: null, options: null,
      timeLeft: state.timerSeconds, timerHandle: null
    };
    buildMCOptions();
    state.screen = 'drill';
    maybeShowShortcutHint('mc');
    render();
    if(state.timerEnabled) startTimer();
  }

  var shortcutHintShownFor = {};
  function maybeShowShortcutHint(mode){
    if(!state.keyboardShortcutsEnabled) return;
    if(state.dismissShortcutHints) return;
    if(shortcutHintShownFor[mode]) return;
    shortcutHintShownFor[mode] = true;
    state.shortcutHintMode = mode;
    state.showShortcutHint = true;
  }

  function buildMCOptions(){
    var s = state.session;
    var current = s.queue[s.index];
    var chapterWords = state.chapters[current.chKey];
    var distractorPool = chapterWords.filter(function(w){ return w.id !== current.ref.id; });
    shuffleArr(distractorPool);
    var distractors = distractorPool.slice(0, 3);
    // pad from full deck if chapter too small
    if(distractors.length < 3){
      var need = 3 - distractors.length;
      var fullPool = [];
      state.chapterOrder.forEach(function(ck){
        state.chapters[ck].forEach(function(w){
          if(w.id !== current.ref.id && distractors.indexOf(w)===-1) fullPool.push(w);
        });
      });
      shuffleArr(fullPool);
      distractors = distractors.concat(fullPool.slice(0, need));
    }
    var options = distractors.map(function(w){ return {text:answerText(w), correct:false}; });
    options.push({text: answerText(current.ref), correct:true});
    shuffleArr(options);
    s.options = options;
    s.answered = false;
    s.chosenIdx = null;
  }

  // Splits a pool into match-mode rounds of up to 6 words each, but never leaves a final
  // round smaller than 3 -- instead the last two rounds are rebalanced to both land in the
  // 3-8 range (e.g. 20 words -> 6/6/8 instead of 6/6/6/2; 9 words -> 5/4 instead of 6/3... wait
  // 3 is fine on its own, so 9 stays 6/3; but 8 words -> 4/4 instead of 6/2).
  function computeMatchRoundSizes(total){
    var MAX = 6, MIN = 3;
    if(total <= MAX) return [total];
    var rounds = [];
    var remaining = total;
    while(remaining > MAX){
      rounds.push(MAX);
      remaining -= MAX;
    }
    if(remaining >= MIN){
      rounds.push(remaining);
    } else if(rounds.length > 0){
      // Leftover is too small on its own (1 or 2) -- merge it into the previous round
      // rather than showing a tiny final round. This can push the merged round to 7 or 8,
      // which is the explicitly allowed range per the design.
      rounds[rounds.length-1] += remaining;
    } else {
      rounds.push(remaining);
    }
    return rounds;
  }

  function startMatchSession(chapterKeys, filterMode, reversed){
    var pool = buildPool(chapterKeys, filterMode);
    if(pool.length === 0){ showToast('No words match this mode yet — flag some or get some wrong first!'); return; }
    state.session = {
      type:'match', chapterKeys: chapterKeys, mode: filterMode, reversed: !!reversed,
      fullQueue: pool, roundIndex: 0, roundSizes: computeMatchRoundSizes(pool.length), roundNum: 0,
      correctCount: 0, wrongCount: 0, missed: [],
      termTiles: [], defTiles: [], selectedTerm: null, selectedDef: null, lockedIds: []
    };
    setupMatchRound();
    state.screen = 'drill';
    render();
  }

  function setupMatchRound(){
    var s = state.session;
    var start = s.roundIndex;
    var thisRoundSize = s.roundSizes[s.roundNum];
    var slice = s.fullQueue.slice(start, start + thisRoundSize);
    s.currentRound = slice;
    s.termTiles = shuffleArr(slice.map(function(item){ return {id:item.ref.id, text:promptText(item.ref), ref:item.ref, chKey:item.chKey}; }));
    s.defTiles = shuffleArr(slice.map(function(item){ return {id:item.ref.id, text:answerText(item.ref), ref:item.ref}; }));
    s.selectedTerm = null; s.selectedDef = null; s.lockedIds = [];
  }

  function startTimer(){
    clearTimer();
    state.session.timeLeft = state.timerSeconds;
    state.session.timerHandle = setInterval(function(){
      if(!state.session){ clearTimer(); return; }
      state.session.timeLeft -= 1;
      if(state.session.timeLeft <= 0){
        clearTimer();
        if(state.session.type === 'flip'){
          if(!state.session.flipped){ state.session.flipped = true; render(); setTimeout(function(){ markFlip(false); }, 700); return; }
        } else if(state.session.type === 'mc'){
          if(!state.session.answered){ chooseMC(-1); return; }
        }
      }
      renderTimerOnly();
    }, 1000);
  }
  function clearTimer(){
    if(state.session && state.session.timerHandle){ clearInterval(state.session.timerHandle); state.session.timerHandle = null; }
  }

  // ---- flip mode actions ----
  function flipCard(){ if(!state.session) return; state.session.flipped = !state.session.flipped; render(); }
  function markFlip(gotIt){
    var s = state.session; if(!s) return;
    var current = s.queue[s.index]; var w = current.ref;
    recordResult(w, gotIt, s);
    clearTimer();
    if(s.index + 1 >= s.queue.length){ finishSession(); }
    else { s.index += 1; s.flipped = false; render(); if(state.timerEnabled) startTimer(); }
  }

  // ---- MC mode actions ----
  function chooseMC(idx){
    var s = state.session; if(!s || s.answered) return;
    clearTimer();
    s.answered = true; s.chosenIdx = idx;
    var current = s.queue[s.index]; var w = current.ref;
    var gotIt = idx >= 0 && s.options[idx].correct;
    recordResult(w, gotIt, s);
    render();
    setTimeout(function(){
      if(s.index + 1 >= s.queue.length){ finishSession(); }
      else { s.index += 1; buildMCOptions(); render(); if(state.timerEnabled) startTimer(); }
    }, 900);
  }

  // ---- Keyboard shortcuts for drilling ----
  // Flip mode: Space flips the card, Enter marks "Got it", Shift marks "Missed it" (only once flipped).
  // MC mode: 1-4 picks the corresponding option.
  // Only active during an actual drill, and only if the person hasn't turned it off in Settings.
  // Typing into an input/textarea anywhere else in the app is never intercepted.
  function handleDrillKeydown(e){
    if(!state.keyboardShortcutsEnabled) return;
    if(state.screen !== 'drill' || !state.session) return;
    var tag = (e.target && e.target.tagName) || '';
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;

    // Defensively release focus from whatever button might still hold it (e.g. after a
    // mouse click on "Got it"/"Missed it"), so a native button-activation on Enter/Space
    // never fires alongside our own handling of the same keypress.
    if(document.activeElement && document.activeElement.tagName === 'BUTTON'){
      document.activeElement.blur();
    }

    var s = state.session;
    if(s.type === 'flip'){
      if(e.code === 'Space'){
        e.preventDefault();
        flipCard();
      } else if(e.key === 'Enter'){
        e.preventDefault();
        if(!s.flipped){ flipCard(); } else { markFlip(true); }
      } else if(e.key === 'Shift'){
        e.preventDefault();
        if(!s.flipped){ flipCard(); } else { markFlip(false); }
      }
    } else if(s.type === 'mc'){
      if(['1','2','3','4'].indexOf(e.key) !== -1 && !s.answered){
        var idx = parseInt(e.key,10) - 1;
        if(s.options && idx < s.options.length){ e.preventDefault(); chooseMC(idx); }
      }
    }
  }
  document.addEventListener('keydown', handleDrillKeydown);

  // ---- Match mode actions ----
  function selectMatchTile(side, tile){
    var s = state.session; if(!s) return;
    if(s.lockedIds.indexOf(tile.id) !== -1) return;
    if(side === 'term') s.selectedTerm = (s.selectedTerm && s.selectedTerm.id===tile.id) ? null : tile;
    else s.selectedDef = (s.selectedDef && s.selectedDef.id===tile.id) ? null : tile;

    if(s.selectedTerm && s.selectedDef){
      var isMatch = s.selectedTerm.id === s.selectedDef.id;
      if(isMatch){
        var w = s.selectedTerm.ref;
        recordResult(w, true, s);
        s.lockedIds.push(w.id);
        s.selectedTerm = null; s.selectedDef = null;
        render();
        // check round/session complete
        if(s.lockedIds.length >= s.currentRound.length){
          setTimeout(function(){
            s.roundIndex += s.roundSizes[s.roundNum];
            s.roundNum += 1;
            if(s.roundNum >= s.roundSizes.length){ finishSession(); }
            else { setupMatchRound(); render(); }
          }, 450);
        }
      } else {
        var wrongTerm = s.selectedTerm.ref, wrongDef = s.selectedDef.ref;
        // count as a wrong attempt on the term word only (avoid double punishing)
        recordResult(wrongTerm, false, s, true);
        var badTerm = s.selectedTerm, badDef = s.selectedDef;
        markShake(badTerm.id, 'term'); markShake(badDef.id, 'def');
        render();
        setTimeout(function(){
          if(s.selectedTerm === badTerm) s.selectedTerm = null;
          if(s.selectedDef === badDef) s.selectedDef = null;
          render();
        }, 400);
      }
    } else {
      render();
    }
  }
  var shakeIds = {};
  function markShake(id, side){ shakeIds[side+id] = true; setTimeout(function(){ delete shakeIds[side+id]; }, 400); }

  function recordResult(w, gotIt, s, isMatchMiss){
    w.seen += 1;
    if(gotIt){ w.correct += 1; w.box = Math.min(w.box+1,5); s.correctCount += 1; }
    else {
      w.wrong += 1; w.box = 1; s.wrongCount += 1;
      if(!isMatchMiss || s.missed.filter(function(m){return m.term===promptText(w);}).length === 0){
        s.missed.push({term:promptText(w), def:answerText(w)});
      }
    }
  }

  function finishSession(){
    clearTimer();
    state.screen = 'summary';
    saveToStorage();
    render();
  }

  function toggleFlag(word){ word.flagged = !word.flagged; saveToStorage(); render(); }

  function endSessionEarly(){
    clearTimer();
    saveToStorage();
    state.session = null;
    state.screen = 'select';
    render();
  }

  // ---------------- Stats helpers ----------------
  function chapterAccuracy(ck){
    var words = state.chapters[ck];
    var seen = words.filter(function(w){return w.seen>0;});
    if(seen.length===0) return null;
    var totalCorrect = seen.reduce(function(a,w){return a+w.correct;},0);
    var totalSeen = seen.reduce(function(a,w){return a+w.seen;},0);
    return Math.round((totalCorrect/totalSeen)*100);
  }
  function chapterFlaggedCount(ck){ return state.chapters[ck].filter(function(w){ return w.flagged || w.wrong > w.correct; }).length; }
  function totalWordCount(){ var n=0; state.chapterOrder.forEach(function(ck){ n += state.chapters[ck].length; }); return n; }
  function totalFlagged(){ var n=0; state.chapterOrder.forEach(function(ck){ n += chapterFlaggedCount(ck); }); return n; }

      else if(k === 'html') e.innerHTML = attrs[k];
      else if(k.indexOf('on')===0) e.addEventListener(k.slice(2), attrs[k]);
      else if(typeof attrs[k] === 'boolean'){ if(attrs[k]) e.setAttribute(k, ''); }
      else e.setAttribute(k, attrs[k]);
    });
    (children||[]).forEach(function(c){ if(c) e.appendChild(c); });
    return e;
  }

    svg.appendChild(path);

  // Folder appearance editor: an explicit-save overlay (desktop) / full-screen (mobile)

    var pinEntry = state.libraryIndex.find(function(d){ return d.id === state.activeDeckId; });
    if(!pinEntry) { state.folderEditorOpen = false; return el('div'); }
    if(!folderEditorDrafts[state.activeDeckId]){
      folderEditorDrafts[state.activeDeckId] = {folderShape: pinEntry.folderShape||'x', folderStyle: pinEntry.folderStyle||'bright', folderHue: pinEntry.folderHue||0};

        pinEntry.folderShape = draft.folderShape;
        pinEntry.folderStyle = draft.folderStyle;
        pinEntry.folderHue = draft.folderHue;
